<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>FridgeSense</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="header">
            <header id="description">
                <h1>FridgeSense</h1>
                <p>Search for recipes from ingredients in your Fridge!</p>
            </header>
            <div id="inputBar">
                <form id="inputForm">
                    <input type="text" id="input" placeholder="INPUT AN INGREDIENT" autocomplete="off">
                    <button id="submit" type="submit">SUBMIT</button>
                </form>
                <button id="generate" type="click">GENERATE RECIPES</button>
            </div>
            <div id="content"></div>
            <div id="recipes"></div>
        </div>
        <script src="config.js"></script>
        <script type="module" src="ingredient.js"></script>
        <script type="module" src="recipe.js"></script>
    </body>
</html>
